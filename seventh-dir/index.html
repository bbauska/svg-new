<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Border-image + SVG</title>
    <link rel="stylesheet" href="https://public.codepenassets.com/css/reset-2.0.min.css">
<link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <div class="l-wrapper">
    <h1>Border-image + SVG is OMG!</h1>
    
    <div class="box box--1"></div>

    <div class="box box--2"></div>
    
    <div class="box box--3"></div>

    <div class="box box--4"></div>
    
    <div class="link">More borders: <a href="https://codepen.io/yoksel/pen/bwNRxb" target="_blank">Border-image + CSS Gradients</a></div>
</div>


<!-- ========== SVG Sources ========== -->

<svg viewBox="0 0 1 1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <g transform="translate(0,.2) rotate(45, .5 .5)">
        <rect width="70%" height="70%"
              fill="crimson"></rect>
        <rect width="60%" height="60%"
              fill="orangered"
              x="5%" y="5%"></rect>    
        <rect width="50%" height="50%"
              fill="gold"
              x="10%" y="10%"></rect>        
        <rect width="40%" height="40%"
              fill="darkturquoise"
              x="15%" y="15%"></rect>        
        <rect width="30%" height="30%"
              fill="teal"
              x="20%" y="20%"></rect>
        <rect width="20%" height="20%"
              fill="white"
              x="25%" y="25%"></rect>
    </g>
</svg>

<svg viewBox="0 0 1 1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
    <linearGradient id="grad-star"
                    gradientTransform="rotate(-45 .5 .5)">
        <stop stop-color="crimson" offset="0%"></stop>
        <stop stop-color="gold" offset="50%"></stop>
        <stop stop-color="teal" offset="100%"></stop>
    </linearGradient>
    <linearGradient id="grad-star--2" xlink:href="#grad-star" gradientTransform="rotate(-135 .5 .5)">
    </linearGradient>
    <linearGradient id="grad-star--3" xlink:href="#grad-star" gradientTransform="rotate(-225 .5 .5)">
    </linearGradient>
    <linearGradient id="grad-star--4" xlink:href="#grad-star" gradientTransform="rotate(45 .5 .5)">
    </linearGradient>
    <rect width="50%" height="50%"
          fill="url(#grad-star)"></rect>
    <rect width="50%" height="50%"
          x="50%"
          fill="url(#grad-star--2)"></rect>
    <rect width="50%" height="50%"
          x="50%" y="50%"
          fill="url(#grad-star--3)"></rect>
    <rect width="50%" height="50%"
          y="50%"
          fill="url(#grad-star--4)"></rect>
</svg>

<svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">    
    <circle r="25%" cx="50%" cy="50%" fill="none" stroke="purple" stroke-width="5" stroke-dasharray="1 3"/>
    <circle r="25%" cx="50%" cy="50%" fill="none" stroke="orangered" stroke-width="5" stroke-dasharray=".8 2.5"/>
    <circle r="25%" cx="50%" cy="50%" fill="none" stroke="gold" stroke-width="5" stroke-dasharray=".6 2"/>
    <circle r="25%" cx="50%" cy="50%" fill="none" stroke="yellowgreen" stroke-width="5" stroke-dasharray=".4 1.5"/>
    <circle r="25%" cx="50%" cy="50%" fill="none" stroke="teal" stroke-width="5" stroke-dasharray=".25 1"/></svg>

<svg viewBox="0 0 10 10" xmlns="http://www.w3.org/2000/svg">       <circle r="50%" cx="50%" cy="50%" fill="crimson"/>
    <circle r="45%" cx="50%" cy="50%" fill="orangered"/>
    <circle r="40%" cx="50%" cy="50%" fill="gold"/>
    <circle r="35%" cx="50%" cy="50%" fill="darkturquoise"/>
    <circle r="30%" cx="50%" cy="50%" fill="teal"/>
    <circle r="25%" cx="50%" cy="50%" fill="white"/>
</svg>
    <script  src="./script.js"></script>

  </body>
  
</html>
